<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <title>Reservation</title>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <link href="assets/styles/style.css" rel="stylesheet"/>
    <link href="assets/styles/responsive.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=DM+Sans" rel="stylesheet"/>
</head>

<body>
<header class="header" id="myTopnav">
    <div class="header-logo">
        <img alt="logo" src="assets/images/Logo.png"/>
    </div>

    <div class="main-navbar">
        <a class="active" href="#">Accueil</a>
        <a href="#">Détails de l'évènement</a>
        <a href="#">À propos</a>
        <a href="#">Contact</a>
        <a href="#">Évènements passés</a>
        <a aria-label="Menu" class="icon-navbar" href="#">
            <i class="fa fa-bars icons"></i>
        </a>
    </div>
</header>

<main>

    <div class="modal">
        <div class="content">
            <span class="close"></span>
            <div class="modal-body">
                <form name="reserve">
                    <div class="formData">
                        <label for="first">Prénom</label><br>
                        <input class="text-control" id="first" name="first" type="text"/><br>
                    </div>
                    <div class="formData">
                        <label for="last">Nom</label><br>
                        <input class="text-control" id="last" name="last" type="text"/><br>
                    </div>
                    <div class="formData">
                        <label for="email">E-mail</label><br>
                        <input class="text-control" id="email" name="email" type="email"/><br>
                    </div>
                    <div class="formData">
                        <label for="birthdate">Date de naissance</label><br>
                        <input class="text-control" id="birthdate" name="birthdate" type="date"/><br>
                    </div>
                    <div class="formData">
                        <label for="quantity">À combien de tournois GameOn avez-vous déjà participé ?</label><br>
                        <input class="text-control" id="quantity" max="99" min="0" name="quantity" type="number">
                    </div>


                    <div class="formData locations">
                        <label>À quel tournoi souhaitez-vous participer cette année ?</label>
                        <input class="checkbox-input" id="location1" name="location" type="radio" value="New York"/>
                        <label class="checkbox-label" for="location1"><span class="checkbox-icon"></span>New
                            York</label>
                        <input class="checkbox-input" id="location2" name="location" type="radio"
                               value="San Francisco"/>
                        <label class="checkbox-label" for="location2"><span class="checkbox-icon"></span>San
                            Francisco</label>
                        <input class="checkbox-input" id="location3" name="location" type="radio" value="Seattle"/>
                        <label class="checkbox-label" for="location3"><span class="checkbox-icon"></span>Seattle</label>
                        <input class="checkbox-input" id="location4" name="location" type="radio" value="Chicago"/>
                        <label class="checkbox-label" for="location4"><span class="checkbox-icon"></span>Chicago</label>
                        <input class="checkbox-input" id="location5" name="location" type="radio" value="Boston"/>
                        <label class="checkbox-label" for="location5"><span class="checkbox-icon"></span>Boston</label>
                        <input class="checkbox-input" id="location6" name="location" type="radio" value="Portland"/>
                        <label class="checkbox-label" for="location6"><span
                                class="checkbox-icon"></span>Portland</label>
                    </div>

                    <div class="formData checkboxCgu">
                        <input class="checkbox-input" id="checkbox1" type="checkbox"/>
                        <label class="checkbox2-label " for="checkbox1"><span class="checkbox-icon"></span>
                            J'ai lu et accepté les conditions d'utilisation.
                        </label><br>
                        <input class="checkbox-input" id="checkbox2" type="checkbox"/>
                        <label class="checkbox2-label" for="checkbox2"><span class="checkbox-icon"></span>
                            Je souhaite être prévenu des prochains évènements.
                        </label><br>
                    </div>
                    <button class="button btn-submit" type="submit" value="C'est parti">C'est parti</button>
                </form>
            </div>
        </div>
    </div>

    <div class="hero-section">
        <div class="hero-content">
            <h1 class="hero-headline">
                Marathon national<br>
                de jeux vidéos
            </h1>
            <p class="hero-text">
                Vous aimez jouer ? Notre prochain évènement gaming est ouvert
                aux réservations... Places limitées !
            </p>
            <button class="btn-signup modal-btn">
                je m'inscris
            </button>
        </div>
        <div class="hero-img">
            <img alt="img" src="assets/images/bg_img.jpg"/>
        </div>
        <button class="btn-signup modal-btn">
            je m'inscris
        </button>
    </div>


</main>
<footer>
    <p class="copyrights">
        Copyright 2014 - 2022, GameOn Inc.
    </p>
</footer>
<script src="javascript/index.js" type="module"></script>
</body>
</html>
